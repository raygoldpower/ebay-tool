<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay Sourcing Master PRO 2026</title>
    <!-- Dependencies: Tailwind CSS, React, Prop-Types, Recharts, Babel, Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        input[type=range] { accent-color: #2563eb; }
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

        const App = () => {
            // --- Global States ---
            const [exchangeRate, setExchangeRate] = useState(1400); 
            const [manualCost, setManualCost] = useState(64000);
            const [manualL, setManualL] = useState(30);
            const [manualW, setManualW] = useState(20);
            const [manualH, setManualH] = useState(15);
            const [manualActualWeight, setManualActualWeight] = useState(0.5);
            const [targetMargin, setTargetMargin] = useState(15);
            const [competitorPrice, setCompetitorPrice] = useState(120); 
            const [origin, setOrigin] = useState('KR'); 
            const [shipMethod, setShipMethod] = useState('AIR'); 
            const [htsSection, setHtsSection] = useState('SEC_64_67');

            // --- HTS Database 2026 ---
            const HTS_DATA = {
                "SEC_64_67": { name: "신발/인솔", base_rate: 0.08, is_metal: false },
                "SEC_84_85": { name: "전자/기계부품", base_rate: 0.02, is_metal: true },
                "SEC_16_MANDU": { name: "가공식품(만두 등)", base_rate: 0.06, is_metal: false },
                "SEC_33_COSM": { name: "화장품", base_rate: 0.03, is_metal: false },
                "SEC_95_TOY": { name: "장난감", base_rate: 0.02, is_metal: false },
                "SEC_90_MED": { name: "의료기기", base_rate: 0.009, is_metal: true },
                "SEC_95_SPRT": { name: "스포츠용품", base_rate: 0.025, is_metal: false },
                "SEC_61_62": { name: "의류(Apparel)", base_rate: 0.165, is_metal: false },
                "SEC_94_FURN": { name: "가구", base_rate: 0.025, is_metal: false },
                "SEC_49_BOOK": { name: "책/인쇄물", base_rate: 0.00, is_metal: false },
                "SEC_16_21": { name: "일반 식품", base_rate: 0.06, is_metal: false },
                "SEC_85_ELEC": { name: "가전/전자제품", base_rate: 0.05, is_metal: false },
                "SEC_39_69": { name: "식기류", base_rate: 0.08, is_metal: false },
                "SEC_85_PHON": { name: "핸드폰", base_rate: 0.00, is_metal: false },
                "SEC_39_CASE": { name: "폰케이스", base_rate: 0.07, is_metal: false },
                "SEC_39_3D": { name: "3D프린터 출력물", base_rate: 0.07, is_metal: false },
            };

            const CUSTOMS_2026 = {
                GLOBAL_SURCHARGE: 0.10, KR_MIN_TARIFF: 0.15, MPF_RATE: 0.003464, HMF_RATE: 0.00125,
                MPF_CONFIG: { INFORMAL: 2.69, FORMAL_MIN: 33.58, FORMAL_MAX: 651.50 }
            };

            const EBAY_CATEGORIES = {
                GENERAL: { name: '일반 잡화', fee: 0.15 },
                ELECTRONICS: { name: '전자제품', fee: 0.12 },
                CLOTHING: { name: '의류/신발', fee: 0.125 },
                COLLECTIBLES: { name: '수집품', fee: 0.13 },
            };
            const [selectedCat, setSelectedCat] = useState('GENERAL');
            const PAYONEER_FEE = 0.012; 
            const DOM_SHIPPING = 3000;

            const CARRIERS = {
                FedEx: { name: '페덱스', base: 15000, rate: 25000, divisor: 5000, color: 'text-purple-600', bg: 'bg-purple-50' },
                Lincos: { name: '린코스', base: 12000, rate: 18000, divisor: 6000, color: 'text-blue-600', bg: 'bg-blue-50' },
                EMS: { name: 'EMS', base: 22000, rate: 15000, divisor: null, color: 'text-red-600', bg: 'bg-red-50' }
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // --- Landed Cost Calculation Engine ---
            const comparisonData = useMemo(() => {
                const currentEbayFee = EBAY_CATEGORIES[selectedCat].fee;
                const section = HTS_DATA[htsSection];

                return Object.keys(CARRIERS).map(key => {
                    const carrier = CARRIERS[key];
                    let volWeight = 0;
                    let chargeableWeight = manualActualWeight;
                    let comments = [];
                    let isCriticalError = false;

                    if (carrier.divisor) {
                        volWeight = (manualL * manualW * manualH) / carrier.divisor;
                        chargeableWeight = Math.max(manualActualWeight, volWeight);
                    }

                    if (key === 'FedEx' && manualActualWeight > 24.95) comments.push("실중량 24.95kg 초과: 추가 취급 수수료 발생");
                    if (key === 'Lincos' && manualActualWeight > 20.0) { comments.push("린코스 중량 초과(20kg)"); isCriticalError = true; }
                    if (key === 'EMS' && manualActualWeight > 30.0) { comments.push("EMS 중량 초과(30kg)"); isCriticalError = true; }

                    const intlShipping = carrier.base + (chargeableWeight * carrier.rate);
                    const totalOutflowKRW = manualCost + DOM_SHIPPING + intlShipping;

                    let appliedDutyRate = origin === "KR" ? Math.max(section.base_rate, CUSTOMS_2026.KR_MIN_TARIFF) : section.base_rate;
                    let finalDutyRate = appliedDutyRate + CUSTOMS_2026.GLOBAL_SURCHARGE;
                    if (origin === "CN") finalDutyRate += 0.25;

                    const mpfInformalUSD = CUSTOMS_2026.MPF_CONFIG.INFORMAL;
                    const mpfInformalKRW = mpfInformalUSD * exchangeRate;
                    const denominator = (1 - currentEbayFee - PAYONEER_FEE - (targetMargin / 100) - finalDutyRate);
                    
                    let priceUSD = 0;
                    let dutyKRW = 0;
                    let mpfKRW = mpfInformalKRW;
                    let hmfKRW = 0;
                    let requiredRevKRW = 0;

                    if (denominator > 0) {
                        requiredRevKRW = (totalOutflowKRW + mpfInformalKRW) / denominator;
                        priceUSD = requiredRevKRW / exchangeRate;
                        if (priceUSD >= 2500) {
                            const formalMPFKRW = Math.max(
                                Math.min(requiredRevKRW * CUSTOMS_2026.MPF_RATE, CUSTOMS_2026.MPF_CONFIG.FORMAL_MAX * exchangeRate),
                                CUSTOMS_2026.MPF_CONFIG.FORMAL_MIN * exchangeRate
                            );
                            mpfKRW = formalMPFKRW;
                            requiredRevKRW = (totalOutflowKRW + mpfKRW) / denominator;
                            priceUSD = requiredRevKRW / exchangeRate;
                        }
                        dutyKRW = requiredRevKRW * finalDutyRate;
                        if (shipMethod === "SEA") hmfKRW = requiredRevKRW * CUSTOMS_2026.HMF_RATE;
                    }

                    if (origin === "KR") comments.push("[2026 개정] 한국산 제품 관세 하한선 15% 적용");
                    if (priceUSD > 800) comments.push("[위험] 미국 관세 한도($800) 초과: 통관 위험");

                    return {
                        key, ...carrier, chargeableWeight: chargeableWeight.toFixed(2), volWeight: volWeight.toFixed(2),
                        intlShipping, priceUSD: priceUSD > 0 ? priceUSD.toFixed(2) : "산출불가",
                        profitKRW: Math.floor(requiredRevKRW * (targetMargin / 100)),
                        dutyKRW, mpfKRW, hmfKRW, finalDutyRate: (finalDutyRate * 100).toFixed(1),
                        entryType: priceUSD < 2500 ? "약식" : "정식",
                        comments, isCriticalError
                    };
                });
            }, [manualL, manualW, manualH, manualActualWeight, manualCost, targetMargin, exchangeRate, selectedCat, origin, shipMethod, htsSection]);

            const validData = comparisonData.filter(d => !d.isCriticalError && d.priceUSD !== "산출불가");
            const recommendedInfo = validData.length > 0 
                ? validData.reduce((prev, curr) => parseFloat(prev.priceUSD) < parseFloat(curr.priceUSD) ? prev : curr)
                : comparisonData[0];

            const competitivenessScore = useMemo(() => {
                if (!competitorPrice || isNaN(recommendedInfo.priceUSD)) return 0;
                const diff = ((competitorPrice - parseFloat(recommendedInfo.priceUSD)) / competitorPrice) * 100;
                return Math.min(Math.max(Math.floor(50 + diff * 2.5), 0), 100);
            }, [competitorPrice, recommendedInfo]);

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-40 px-6 py-5 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="p-2 bg-blue-600 rounded-lg text-white shadow-lg flex items-center justify-center">
                                <i data-lucide="package" style={{width: 24, height: 24}}></i>
                            </div>
                            <h1 className="text-xl md:text-2xl font-black tracking-tighter text-slate-800 uppercase">eBay Master <span className="text-blue-600">2026</span></h1>
                        </div>
                        <div className="text-xs font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-xl border">
                            환율: <span className="text-blue-600 font-black">₩{exchangeRate.toLocaleString()}</span>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-6 space-y-8">
                        <section className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                            {/* Input Panel */}
                            <div className="lg:col-span-5 bg-white p-6 md:p-8 rounded-[2.5rem] border shadow-md space-y-8">
                                <h2 className="text-lg font-bold flex items-center gap-2 text-slate-700 border-b pb-4 uppercase">
                                    <i data-lucide="calculator" className="text-blue-500"></i> 소싱 정밀 입력
                                </h2>
                                <div className="grid grid-cols-4 gap-3">
                                    {[['가로', manualL, setManualL], ['세로', manualW, setManualW], ['높이', manualH, setManualH], ['무게', manualActualWeight, setManualActualWeight]].map(([label, val, set]) => (
                                        <div key={label} className="space-y-1 text-center">
                                            <p className="text-[11px] font-black text-slate-400 uppercase">{label}</p>
                                            <input type="number" value={val} onChange={(e) => set(Number(e.target.value))} className="w-full bg-slate-50 border-none rounded-xl p-3 text-center font-bold text-base outline-none shadow-inner focus:ring-2 focus:ring-blue-200 transition-all"/>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] shadow-inner border border-slate-100">
                                        <p className="text-[11px] font-black text-slate-400 mb-2 uppercase flex items-center gap-1"><i data-lucide="globe" size={12}/> 원산지</p>
                                        <select value={origin} onChange={(e) => setOrigin(e.target.value)} className="bg-transparent text-lg font-black w-full outline-none text-blue-600 cursor-pointer">
                                            <option value="KR">한국산</option><option value="CN">중국산</option><option value="OTHER">제3국산</option>
                                        </select>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-[1.5rem] shadow-inner border border-slate-100">
                                        <p className="text-[11px] font-black text-slate-400 mb-2 uppercase flex items-center gap-1"><i data-lucide="truck" size={12}/> 매입가</p>
                                        <input type="number" value={manualCost} onChange={(e) => setManualCost(Number(e.target.value))} className="bg-transparent text-lg font-black w-full outline-none text-green-600"/>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <p className="text-[11px] font-black text-slate-400 uppercase ml-1">HTS 품목</p>
                                        <select value={htsSection} onChange={(e) => setHtsSection(e.target.value)} className="w-full bg-slate-100 border-none rounded-xl p-3 text-sm font-bold outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                                            {Object.keys(HTS_DATA).map(k => (
                                                <option key={k} value={k}>{HTS_DATA[k].name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <p className="text-[11px] font-black text-slate-400 uppercase ml-1">경쟁사 가격($)</p>
                                        <input type="number" value={competitorPrice} onChange={(e) => setCompetitorPrice(Number(e.target.value))} className="w-full bg-slate-100 border-none rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-inner"/>
                                    </div>
                                </div>
                                <div className="pt-4 px-1">
                                    <p className="text-sm font-bold text-slate-600 mb-4 uppercase">마진 설정: <span className="text-blue-600">{targetMargin}%</span></p>
                                    <input type="range" min="5" max="40" value={targetMargin} onChange={(e) => setTargetMargin(Number(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg cursor-pointer accent-blue-600 transition-all"/>
                                </div>
                            </div>

                            {/* Main Strategy Report (Price text size and layout fixed) */}
                            <div className="lg:col-span-7 bg-slate-900 rounded-[3rem] p-8 md:p-10 text-white relative overflow-hidden flex flex-col justify-between shadow-xl">
                                <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none rotate-12"><i data-lucide="shield-check" style={{width: 200, height: 200}}></i></div>
                                
                                <div className="relative z-10 space-y-10">
                                    <div className="flex flex-col md:flex-row justify-between items-center md:items-start gap-4">
                                        <div className="space-y-1">
                                            <h3 className="text-blue-400 font-black flex items-center gap-2 uppercase tracking-widest text-sm">
                                                <i data-lucide="zap" size={16}></i> 2026 관세 적용 소싱 전략
                                            </h3>
                                            <p className="text-slate-500 text-sm font-medium italic">추천 배송사: {recommendedInfo.name} ({recommendedInfo.entryType})</p>
                                        </div>
                                        <div className="bg-blue-500/20 text-blue-400 px-4 py-2 rounded-xl border border-blue-500/30 font-black text-xs uppercase flex items-center">
                                            관세율 {recommendedInfo.finalDutyRate}% 반영
                                        </div>
                                    </div>

                                    {/* Responsive Price and Competitiveness Panel */}
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                                        <div className="md:col-span-7 space-y-6 text-center md:text-left pr-4">
                                            <p className="text-slate-400 text-xs font-black uppercase tracking-[0.2em]">권장 리스팅 가격</p>
                                            <div className="flex items-baseline justify-center md:justify-start gap-3 leading-tight">
                                                {/* Price size adjusted from text-9xl to text-6xl/7xl to prevent overlap */}
                                                <span className="text-6xl md:text-7xl font-black text-white tracking-tighter no-wrap">${recommendedInfo.priceUSD}</span>
                                                <span className="text-blue-400 font-black text-xl md:text-2xl">USD</span>
                                            </div>
                                            <div className="flex items-center gap-3 text-slate-300 text-sm font-bold bg-white/5 p-4 rounded-2xl border border-white/5 w-fit mx-auto md:mx-0 shadow-inner">
                                                <i data-lucide="check-circle-2" className="text-green-500" size={16}></i>
                                                <span>정산 예상: ₩{(parseFloat(recommendedInfo.priceUSD) * exchangeRate).toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                            </div>
                                        </div>

                                        <div className="md:col-span-5 bg-white/5 p-6 md:p-8 rounded-[2.5rem] border border-white/10 flex flex-col justify-between backdrop-blur-xl shadow-2xl">
                                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3 text-center md:text-left">경쟁력 지수</p>
                                            <div className="flex items-end justify-center md:justify-start gap-3">
                                                <span className={`text-6xl font-black ${competitivenessScore > 70 ? 'text-green-400' : competitivenessScore > 40 ? 'text-yellow-400' : 'text-red-400'}`}>{competitivenessScore}</span>
                                                <span className="text-slate-500 font-bold text-sm mb-2">PTS</span>
                                            </div>
                                            <div className="mt-6 h-3 bg-white/10 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-1000 ${competitivenessScore > 70 ? 'bg-green-500' : competitivenessScore > 40 ? 'bg-yellow-500' : 'bg-red-500'}`} style={{ width: `${competitivenessScore}%` }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 pt-10 border-t border-white/10">
                                        <div className="space-y-2"><p className="text-[10px] text-slate-500 font-bold uppercase">순수익액</p><p className="text-xl font-black text-green-400">₩{recommendedInfo.profitKRW.toLocaleString()}</p></div>
                                        <div className="space-y-2"><p className="text-[10px] text-slate-500 font-bold uppercase">예상 관세</p><p className="text-xl font-black text-slate-100">₩{recommendedInfo.dutyKRW.toLocaleString(undefined, {maximumFractionDigits:0})}</p></div>
                                        <div className="space-y-2"><p className="text-[10px] text-slate-500 font-bold uppercase">해외 배송비</p><p className="text-xl font-black text-orange-400">₩{recommendedInfo.intlShipping.toLocaleString()}</p></div>
                                        <div className="space-y-2"><p className="text-[10px] text-slate-500 font-bold uppercase">통관 부가세</p><p className="text-xl font-black text-slate-100">₩{(recommendedInfo.mpfKRW + recommendedInfo.hmfKRW).toLocaleString(undefined, {maximumFractionDigits:0})}</p></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="space-y-6">
                            <h2 className="text-xl font-black flex items-center gap-3 uppercase tracking-tighter px-4 border-l-4 border-blue-600 ml-2">
                                <i data-lucide="truck" className="text-blue-600"></i> 배송사별 정밀 비교 리포트
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {comparisonData.map((carrier) => (
                                    <div key={carrier.key} className={`relative bg-white rounded-[2.5rem] p-8 md:p-10 border-2 transition-all duration-500 ${carrier.key === recommendedInfo.key ? 'border-blue-500 shadow-2xl ring-8 ring-blue-50' : 'border-gray-100 opacity-90'}`}>
                                        <div className="flex justify-between items-start mb-10">
                                            <div className="space-y-1">
                                                <span className={`text-[10px] font-black uppercase tracking-widest ${carrier.color}`}>{carrier.name}</span>
                                                <h3 className="text-4xl font-black leading-none">${carrier.priceUSD}</h3>
                                            </div>
                                            <div className={`${carrier.bg} ${carrier.color} p-4 rounded-2xl shadow-inner`}><i data-lucide="truck" size={24}></i></div>
                                        </div>
                                        <div className="space-y-6 border-t border-slate-50 pt-8 text-sm">
                                            <div className="flex justify-between font-medium"><span className="text-slate-400 uppercase text-[11px]">관세 및 제비용</span><span className="font-bold text-slate-800">₩{(carrier.dutyKRW + carrier.mpfKRW + carrier.hmfKRW).toLocaleString(undefined, {maximumFractionDigits:0})}</span></div>
                                            <div className="flex justify-between font-medium"><span className="text-slate-400 uppercase text-[11px]">국제 항공 운송비</span><span className="font-bold text-orange-600">₩{carrier.intlShipping.toLocaleString()}</span></div>
                                            <div className="flex justify-between text-base border-b border-slate-50 pb-6"><span className="text-slate-400 font-black uppercase text-xs">확보 순익</span><span className="font-black text-green-600 text-2xl">₩{carrier.profitKRW.toLocaleString()}</span></div>
                                            <div className="min-h-[120px] bg-slate-50/80 p-6 rounded-2xl border shadow-inner flex flex-col justify-center">
                                                {carrier.comments.length > 0 ? carrier.comments.map((msg, i) => (
                                                    <div key={i} className={`flex items-start gap-3 text-xs mb-3 font-bold leading-relaxed ${msg.includes("[위험]") ? 'text-red-600' : 'text-slate-700'}`}>
                                                        <i data-lucide="chevron-right" className="shrink-0 mt-1 text-blue-500" size={14}></i><span className="text-left">{msg}</span>
                                                    </div>
                                                )) : <div className="flex items-center gap-3 text-xs text-blue-600 font-black"><i data-lucide="check-circle-2" size={16}></i><span>모든 규격 및 통관 양호</span></div>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="bg-white p-10 rounded-[3rem] border shadow-md space-y-6">
                            <h2 className="text-2xl font-black flex items-center gap-3 text-slate-800 uppercase tracking-tighter border-b pb-4"><i data-lucide="trending-up" className="text-green-500"></i> 미국 시장 실시간 트렌드 분석</h2>
                            <div className="h-64 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={[ {name: '1월', v: 400}, {name: '2월', v: 300}, {name: '3월', v: 600}, {name: '4월', v: 800}, {name: '5월', v: 750}, {name: '현재', v: 950} ]}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis dataKey="name" stroke="#94a3b8" />
                                        <YAxis hide />
                                        <Tooltip contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                        <Line type="monotone" dataKey="v" stroke="#2563eb" strokeWidth={6} dot={{ r: 8, fill: '#2563eb', strokeWidth: 0 }} activeDot={{ r: 10 }} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </section>
                    </main>
